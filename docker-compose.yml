version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: notification-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: notifications
    volumes:
      - mongodb_data:/data/db
    networks:
      - notification-network

  redis:
    image: redis:latest
    container_name: notification-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - notification-network

  backend:
    build:
      context: .
      dockerfile: notification_app_be/Dockerfile
    container_name: notification-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/notifications
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - notification-network

  frontend:
    build:
      context: .
      dockerfile: notification_app_fe/Dockerfile
    container_name: notification-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - notification-network

volumes:
  mongodb_data:
  redis_data:

networks:
  notification-network:
    driver: bridge
