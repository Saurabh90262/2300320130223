version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: affordmed-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: affordmed
    volumes:
      - mongodb_data:/data/db
    networks:
      - affordmed-network

  redis:
    image: redis:latest
    container_name: affordmed-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - affordmed-network

  backend:
    build:
      context: ./notification_app_be
      dockerfile: Dockerfile
    container_name: affordmed-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/affordmed
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - affordmed-network

  frontend:
    build:
      context: ./notification_app_fe
      dockerfile: Dockerfile
    container_name: affordmed-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - affordmed-network

volumes:
  mongodb_data:
  redis_data:

networks:
  affordmed-network:
    driver: bridge
